
<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: #fff; }
  .container { display: flex; flex-wrap: wrap; }
  .box { position: relative; width: 1024px; height: 1024px; margin: 10px; background: url('sheets/bird.png'); border: 1px solid red; }
  .grid7 { background-image: linear-gradient(to right, transparent 145px, rgba(255,0,0,0.5) 146px), linear-gradient(to bottom, transparent 145px, rgba(255,0,0,0.5) 146px); background-size: 146.28px 146.28px; }
  .grid8 { background-image: linear-gradient(to right, transparent 127px, rgba(0,255,0,0.5) 128px), linear-gradient(to bottom, transparent 127px, rgba(0,255,0,0.5) 128px); background-size: 128px 128px; }
  .grid9 { background-image: linear-gradient(to right, transparent 112px, rgba(0,0,255,0.5) 113px), linear-gradient(to bottom, transparent 112px, rgba(0,0,255,0.5) 113px); background-size: 113.7px 113.7px; }
</style>
</head>
<body>
  <div class='container'>
    <div>
      <h2>7x7 (146px)</h2>
      <div class='box grid7'></div>
    </div>
    <div>
      <h2>8x8 (128px)</h2>
      <div class='box grid8'></div>
    </div>
    <div>
      <h2>9x9 (113px)</h2>
      <div class='box grid9'></div>
    </div>
  </div>
</body>
</html>
